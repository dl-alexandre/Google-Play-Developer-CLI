name: Auto Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master, main]
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  auto-release:
    name: Auto Release
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Configure Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
      
      - name: Get last tag and commits
        id: version
        run: |
          # Get the last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "last_tag=$LAST_TAG" >> $GITHUB_OUTPUT
          
          # Get commits since last tag
          if [ "$LAST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --format='%H %s' --no-merges)
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --format='%H %s' --no-merges)
          fi
          
          # Check for skip-release in any commit
          if echo "$COMMITS" | grep -qE '\[skip-release\]|\[skip release\]'; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "Found [skip-release] in commits, skipping"
            exit 0
          fi
          
          # Count commits
          COMMIT_COUNT=$(echo "$COMMITS" | grep -c '^' || echo "0")
          
          if [ "$COMMIT_COUNT" -eq "0" ]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "No new commits, skipping"
            exit 0
          fi
          
          # Determine version bump type
          BUMP_TYPE="${{ github.event.inputs.version_bump }}"
          if [ -z "$BUMP_TYPE" ] || [ "$BUMP_TYPE" = "patch" ]; then
            if echo "$COMMITS" | grep -qiE '^(feat|feature|minor):'; then
              BUMP_TYPE="minor"
            elif echo "$COMMITS" | grep -qiE '^(breaking|major|BREAKING CHANGE):'; then
              BUMP_TYPE="major"
            else
              BUMP_TYPE="patch"
            fi
          fi
          
          echo "bump_type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          
          # Parse current version
          CURRENT_VERSION=${LAST_TAG#v}
          MAJOR=$(echo $CURRENT_VERSION | cut -d. -f1)
          MINOR=$(echo $CURRENT_VERSION | cut -d. -f2)
          PATCH=$(echo $CURRENT_VERSION | cut -d. -f3)
          
          # Bump version
          case $BUMP_TYPE in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
              ;;
            patch)
              NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
              ;;
          esac
          
          NEW_TAG="v${NEW_VERSION}"
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "should_release=true" >> $GITHUB_OUTPUT
          
          # Save commits for later steps
          echo "$COMMITS" > /tmp/commits.txt
      
      - name: Update CHANGELOG.md
        if: steps.version.outputs.should_release == 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          NEW_TAG="${{ steps.version.outputs.new_tag }}"
          TODAY=$(date +%Y-%m-%d)
          LAST_TAG="${{ steps.version.outputs.last_tag }}"
          
          # Create new version section
          echo "## [${NEW_VERSION}] - ${TODAY}" > /tmp/new_section.txt
          echo "" >> /tmp/new_section.txt
          echo "### Changes" >> /tmp/new_section.txt
          echo "" >> /tmp/new_section.txt
          
          # Add commit messages
          if [ -f /tmp/commits.txt ]; then
            while read -r HASH MSG; do
              if [ -n "$MSG" ]; then
                # Skip merge commits
                case "$MSG" in
                  "Merge pull request"*) continue ;;
                  "Merge branch"*) continue ;;
                  [vV][0-9]*) continue ;;
                esac
                echo "- ${MSG}" >> /tmp/new_section.txt
              fi
            done < /tmp/commits.txt
          else
            echo "- Automated patch release" >> /tmp/new_section.txt
          fi
          
          echo "" >> /tmp/new_section.txt
          
          # Read the full section
          NEW_SECTION=$(cat /tmp/new_section.txt)
          
          # Insert after [Unreleased]
          awk -v section="$NEW_SECTION" '/^## \[Unreleased\]/{print; print ""; print section; next}1' CHANGELOG.md > /tmp/changelog_new.md
          
          # Update compare links
          sed -i "s|\[Unreleased\]: .*|[Unreleased]: https://github.com/dl-alexandre/Google-Play-Developer-CLI/compare/${NEW_TAG}...HEAD\n[${NEW_VERSION}]: https://github.com/dl-alexandre/Google-Play-Developer-CLI/compare/${LAST_TAG}...${NEW_TAG}|" /tmp/changelog_new.md
          
          mv /tmp/changelog_new.md CHANGELOG.md
      
      - name: Commit CHANGELOG update
        if: steps.version.outputs.should_release == 'true'
        run: |
          git add CHANGELOG.md
          LAST_TAG="${{ steps.version.outputs.last_tag }}"
          
          # Build commit message
          echo "chore(release): prepare ${{ steps.version.outputs.new_tag }}" > /tmp/commit_msg.txt
          echo "" >> /tmp/commit_msg.txt
          echo "Auto-generated release preparation." >> /tmp/commit_msg.txt
          echo "" >> /tmp/commit_msg.txt
          echo "Changes:" >> /tmp/commit_msg.txt
          git log ${LAST_TAG}..HEAD --oneline --no-merges >> /tmp/commit_msg.txt
          
          git commit -F /tmp/commit_msg.txt || echo "Nothing to commit"
      
      - name: Push and tag
        if: steps.version.outputs.should_release == 'true'
        run: |
          NEW_TAG="${{ steps.version.outputs.new_tag }}"
          LAST_TAG="${{ steps.version.outputs.last_tag }}"
          
          # Check if tag already exists
          if git ls-remote --tags origin | grep -q "refs/tags/${NEW_TAG}$"; then
            echo "⚠️ Tag $NEW_TAG already exists on remote, skipping tag creation"
            echo "This usually means the release was already created or the workflow was re-triggered."
            exit 0
          fi
          
          # Push CHANGELOG update
          git push origin HEAD:master || git push origin HEAD:main
          
          # Create tag with message
          echo "Release $NEW_TAG" > /tmp/tag_msg.txt
          echo "" >> /tmp/tag_msg.txt
          echo "Auto-generated release." >> /tmp/tag_msg.txt
          echo "" >> /tmp/tag_msg.txt
          git log ${LAST_TAG}..HEAD --oneline --no-merges >> /tmp/tag_msg.txt
          
          git tag -a "$NEW_TAG" -F /tmp/tag_msg.txt
          git push origin "$NEW_TAG"
      
      - name: Summary
        run: |
          NEW_TAG="${{ steps.version.outputs.new_tag }}"
          if git ls-remote --tags origin | grep -q "refs/tags/${NEW_TAG}$"; then
            echo "⚠️ Tag $NEW_TAG already exists - no new release created"
            echo "This is expected if the release was already processed."
          elif [ "${{ steps.version.outputs.should_release }}" = "true" ]; then
            echo "✅ Released ${{ steps.version.outputs.new_tag }}"
            echo "Previous: ${{ steps.version.outputs.last_tag }}"
          else
            echo "⏭️ Skipped (no changes or [skip-release])"
          fi
