
version: 2

project_name: gpd

before:
  hooks:
    - go mod tidy
    - go mod verify
    # Prefer unit tags for speed/stability in release builds (integration/workflow tests can flake).
    - go test -tags=unit ./...

builds:
  - id: gpd
    main: ./cmd/gpd
    binary: gpd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/dl-alexandre/Google-Play-Developer-CLI/pkg/version.Version={{.Version}}
      - -X github.com/dl-alexandre/Google-Play-Developer-CLI/pkg/version.GitCommit={{.Commit}}
      - -X github.com/dl-alexandre/Google-Play-Developer-CLI/pkg/version.BuildTime={{.Date}}
    flags:
      - -trimpath

archives:
  - id: gpd
    # Must match install.sh FILENAME: gpd_${VERSION}_${OS}_${ARCH}.tar.gz
    # (OS: darwin/linux/windows; ARCH: x86_64 for amd64, else arm64/…)
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

# install.sh verifies SHA-256 lines in shasum format: "<hash>  <filename>"
# Prefers gpd_${VERSION}_checksums.txt, falls back to checksums.txt.
checksum:
  name_template: "gpd_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: dl-alexandre
    name: Google-Play-Developer-CLI
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
  header: |
    ## Google Play Developer CLI v{{.Version}}
    
    Full Changelog: https://github.com/dl-alexandre/Google-Play-Developer-CLI/compare/{{.PreviousTag}}...v{{.Version}}
  footer: |
    ## Installation
    
    ### Binary Download
    Download the appropriate binary for your platform from the assets below.
    
    ### Verification
    Each release publishes `gpd_{{ .Version }}_checksums.txt` (SHA-256, shasum format).
    The install script verifies this automatically; to verify manually:
    ```bash
    shasum -a 256 -c gpd_{{ .Version }}_checksums.txt
    # or: sha256sum -c gpd_{{ .Version }}_checksums.txt
    ```

brews:
  - name: gpd
    repository:
      owner: dl-alexandre
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
      branch: master
      pull_request:
        enabled: false
    commit_author:
      name: goreleaserbot
      email: bot@dl-alexandre.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    directory: Formula
    description: "Fast, lightweight CLI for Google Play Console"
    homepage: "https://github.com/dl-alexandre/Google-Play-Developer-CLI"
    license: "MIT"
    skip_upload: "{{ if index .Env \"HOMEBREW_TAP_TOKEN\" }}false{{ else }}true{{ end }}"
    test: |
      system "#{bin}/gpd", "version"
    install: |
      bin.install "gpd"

scoops:
  - repository:
      owner: dl-alexandre
      name: scoop-bucket
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
      branch: main
      pull_request:
        enabled: false
    commit_author:
      name: goreleaserbot
      email: bot@dl-alexandre.com
    commit_msg_template: "Scoop update for {{ .ProjectName }} version {{ .Tag }}"
    directory: bucket
    description: "Fast, lightweight CLI for Google Play Console"
    homepage: "https://github.com/dl-alexandre/Google-Play-Developer-CLI"
    license: MIT
    skip_upload: "{{ if index .Env \"SCOOP_BUCKET_TOKEN\" }}false{{ else }}true{{ end }}"
    persist:
      - "config.yaml"
