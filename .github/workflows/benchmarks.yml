name: Benchmarks

on:
  schedule:
    - cron: "0 9 * * 1"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    name: Benchmark gpd
    runs-on: ubuntu-latest
    env:
      GPD_REQUIRE_CUSTOM_OAUTH: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"
          cache: true
          check-latest: true

      - name: Run benchmark sweep
        id: benchmark
        run: |
          mkdir -p .artifacts/benchmarks
          BENCH_FILE=".artifacts/benchmarks/benchmark-$(date +%Y%m%d-%H%M%S).txt"
          go test -run '^$' -bench . -benchmem -count=10 ./cmd/... ./internal/... ./pkg/... | tee "$BENCH_FILE"
          echo "bench_file=$BENCH_FILE" >> $GITHUB_OUTPUT

      - name: Download previous main benchmark
        uses: dawidd6/action-download-artifact@v3
        continue-on-error: true
        with:
          name: gpd-benchmark-main
          workflow: benchmarks.yml
          branch: main
          if_no_artifact_found: ignore

      - name: Compare with previous (if available)
        if: hashFiles('benchmark-main.txt') != ''
        run: |
          go build -o bin/benchcheck ./cmd/benchcheck
          bin/benchcheck --baseline benchmark-main.txt --current ${{ steps.benchmark.outputs.bench_file }} --threshold 1.20 || true

      - name: Save as main baseline
        if: github.ref == 'refs/heads/main'
        run: |
          cp ${{ steps.benchmark.outputs.bench_file }} benchmark-main.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: gpd-benchmark-results
          path: .artifacts/benchmarks/
          retention-days: 90

      - name: Upload main baseline
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: gpd-benchmark-main
          path: benchmark-main.txt
          retention-days: 90
